name: CI Kaizen

on: [push]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rendre le script exécutable
        run: chmod +x script.sh
      - name: Run script
        run: ./script.sh
        
  docker-build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository }}/bsimus:latest .

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}/bsimus:latest
  deploy-staging:
    needs: docker-build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Simuler déploiement staging
        run: echo "Déploiement en staging réussi 🚀"
      

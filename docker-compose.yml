services:
  app:
    image: ghcr.io/bsissou/devops-kaizen/app:latest
    #build: .
    container_name: app
    ports:
      - "5000:5000"  
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: example
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: example


